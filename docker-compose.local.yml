# Local Fission quality-loop overlay.
#
# CI must NOT use this file. Official runs bake GitHub Releases only.
#
# Usage:
#   scripts/prepare_local_fission.sh
#   docker compose -f docker-compose.yml -f docker-compose.local.yml \
#     --profile local up -d --build --wait fission
#   curl -s http://localhost:${FISSION_HOST_PORT:-8007}/health | jq .
#
# Requires a Linux ELF fission_cli matching the container platform
# (compose still defaults to linux/amd64). prepare_local_fission.sh builds it.

services:
  fission:
    profiles: ["local"]
    build:
      context: ./docker/fission
      args:
        FISSION_SOURCE: local
        # unused when FISSION_SOURCE=local, kept for cache stability
        FISSION_VERSION: ${FISSION_VERSION:-v0.1.2}
    environment:
      FISSION_SOURCE: local
      FISSION_LOCAL_ROOT: /opt/fission-local
      FISSION_GIT_SHA: ${FISSION_GIT_SHA:-unknown}
      FISSION_SOURCE_FINGERPRINT: ${FISSION_SOURCE_FINGERPRINT:-unknown}
      FISSION_RELEASE_VERSION: local-${FISSION_GIT_SHA:-dev}
      FISSION_SLEIGH_SPEC_DIR: /sleigh-specs
      FISSION_RESOURCE_ROOT: /opt/fission-utils/utils
      FISSION_GHIDRA_DATA_DIR: /opt/fission-utils/utils/ghidra-data
    volumes:
      - ./corpus:/corpus:ro
      - ${FISSION_LOCAL_BUNDLE:-./.local/fission-bundle}:/opt/fission-local:ro
