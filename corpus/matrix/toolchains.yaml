# Declarative toolchains for multi-language / multi-arch corpus builds.
# Consumed by scripts/build_matrix.py (and legacy build_corpus.py wrapper).

version: 1

defaults:
  pe_x64:
    format: pe
    isa: x86_64
    abi_profile: windows-x86_64
  pe_x86:
    format: pe
    isa: x86_32
    abi_profile: windows-x86
  elf_x64:
    format: elf
    isa: x86_64
    abi_profile: linux-x86_64
  elf_aarch64:
    format: elf
    isa: aarch64
    abi_profile: linux-aarch64

# Named compile recipes. "id" is referenced from manifests / expand rules.
recipes:
  # --- C / PE (primary semantic cohort) ---
  c_gcc_pe_x64:
    language: c
    compiler_id: gcc
    format: pe
    isa: x86_64
    abi_profile: windows-x86_64
    tool: x86_64-w64-mingw32-gcc
    nm: x86_64-w64-mingw32-nm
    flags: ["-g", "-fno-inline", "-fno-omit-frame-pointer"]
    opts: ["-O0", "-O1", "-O2", "-Os", "-O3"]

  c_gcc_pe_x86:
    language: c
    compiler_id: gcc-m32
    format: pe
    isa: x86_32
    abi_profile: windows-x86
    tool: i686-w64-mingw32-gcc
    nm: i686-w64-mingw32-nm
    flags: ["-g", "-fno-inline", "-fno-omit-frame-pointer"]
    opts: ["-O0", "-O2"]

  c_clang_pe_x64:
    language: c
    compiler_id: clang
    format: pe
    isa: x86_64
    abi_profile: windows-x86_64
    tool: clang
    nm: x86_64-w64-mingw32-nm
    target: x86_64-w64-mingw32
    flags: ["-g", "-fno-inline", "-fno-omit-frame-pointer"]
    opts: ["-O0", "-O2"]

  # --- C / ELF (multi-isa track; semantic when elf_native ready) ---
  c_gcc_elf_x64:
    language: c
    compiler_id: gcc-elf
    format: elf
    isa: x86_64
    abi_profile: linux-x86_64
    tool: gcc
    nm: nm
    flags: ["-g", "-fno-inline", "-fno-omit-frame-pointer", "-fno-pie", "-no-pie"]
    opts: ["-O0", "-O2"]

  c_gcc_elf_aarch64:
    language: c
    compiler_id: gcc-aarch64
    format: elf
    isa: aarch64
    abi_profile: linux-aarch64
    tool: aarch64-linux-gnu-gcc
    nm: aarch64-linux-gnu-nm
    flags: ["-g", "-fno-inline", "-fno-omit-frame-pointer", "-static", "-fno-pie", "-no-pie"]
    opts: ["-O0", "-O2"]

  # Placeholders for later languages (builder skips if tool missing unless --require).
  cpp_gxx_pe_x64:
    language: cpp
    compiler_id: g++
    format: pe
    isa: x86_64
    abi_profile: windows-x86_64
    tool: x86_64-w64-mingw32-g++
    nm: x86_64-w64-mingw32-nm
    flags: ["-g", "-fno-inline", "-fno-omit-frame-pointer", "-std=c++17"]
    opts: ["-O0", "-O2"]

  rustc_pe_x64:
    language: rust
    compiler_id: rustc
    format: pe
    isa: x86_64
    abi_profile: windows-x86_64
    tool: rustc
    target: x86_64-pc-windows-gnu
    flags: []
    opts: ["0", "2"]

  go_pe_x64:
    language: go
    compiler_id: go
    format: pe
    isa: x86_64
    abi_profile: windows-x86_64
    tool: go
    env: { GOOS: windows, GOARCH: amd64, CGO_ENABLED: "0" }
    flags: []
    opts: ["default", "noopt"]
