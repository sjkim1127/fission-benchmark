# Decompile speed smoke — isolated from semantic ranking / Pages publish.
# Measures cold vs warm /decompile_batch latency for fission (+ optional ghidra).
name: Speed Smoke

on:
  workflow_dispatch:
    inputs:
      fission_version:
        description: "Fission release tag baked into GHCR image"
        type: string
        default: "v0.1.6"
      trials:
        description: "Timed trials per decompiler (trial 0 = cold)"
        type: string
        default: "5"
      decompilers:
        description: "Comma-separated adapters (fission and/or ghidra)"
        type: string
        default: "fission,ghidra"
  push:
    branches: [main]
    paths:
      - "runner/speed_*.py"
      - "scripts/speed_smoke_subjects.py"
      - ".github/workflows/speed-smoke.yml"
      - "docker/fission/**"
  schedule:
    # Weekly Monday 06:00 UTC — lightweight speed pulse, not ranking.
    - cron: "0 6 * * 1"

env:
  FISSION_SOURCE: release
  FISSION_VERSION: ${{ github.event.inputs.fission_version || 'v0.1.6' }}
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/fission-benchmark
  PYTHONPATH: .
  SPEED_TRIALS: ${{ github.event.inputs.trials || '5' }}

concurrency:
  group: speed-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  speed-smoke:
    name: Micro-bench cold/warm
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Fission version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          requested="${FISSION_VERSION:-v0.1.6}"
          if [ "$requested" = "latest" ]; then
            requested="$(gh api repos/sjkim1127/Fission/releases/latest --jq .tag_name)"
          fi
          echo "FISSION_VERSION=$requested" >> "$GITHUB_ENV"
          echo "Resolved FISSION_VERSION=$requested"

      - name: Pull fission (+ ghidra) images
        run: |
          set -euo pipefail
          DECS="${{ github.event.inputs.decompilers || 'fission,ghidra' }}"
          echo "DECOMPILERS=$DECS" >> "$GITHUB_ENV"
          for svc in $(echo "$DECS" | tr ',' ' '); do
            if [ "$svc" = "fission" ]; then
              remote="${IMAGE_PREFIX}-fission:${FISSION_VERSION}"
              tag="fission-benchmark-fission"
            else
              remote="${IMAGE_PREFIX}-${svc}:latest"
              tag="fission-benchmark-${svc}"
            fi
            echo "Pulling $remote → $tag"
            if docker pull "$remote"; then
              docker tag "$remote" "$tag"
              echo "ok" > "/tmp/pull-${svc}"
            else
              echo "miss" > "/tmp/pull-${svc}"
              echo "WARN pull failed for $remote — will compose build"
            fi
          done

      - name: Start adapters only
        run: |
          set -euo pipefail
          # Only speed-relevant services — never full multi-decomp / oracle.
          SVCS=$(echo "${DECOMPILERS}" | tr ',' ' ')
          for svc in $SVCS; do
            st="$(cat "/tmp/pull-${svc}" 2>/dev/null || echo miss)"
            if [ "$st" != "ok" ]; then
              echo "Building ${svc} locally..."
              docker compose build "$svc"
            fi
          done
          docker compose up -d $SVCS
          # Health wait
          for port_map in "fission:8000" "ghidra:8001"; do
            name="${port_map%%:*}"
            port="${port_map##*:}"
            echo "$DECOMPILERS" | tr ',' '\n' | grep -qx "$name" || continue
            ok=0
            for i in $(seq 1 60); do
              if curl -sf "http://localhost:${port}/health" >/dev/null; then
                echo "✓ $name healthy"
                ok=1
                break
              fi
              sleep 2
            done
            if [ "$ok" != "1" ]; then
              echo "FAIL $name not healthy" >&2
              docker compose logs "$name" || true
              exit 1
            fi
          done

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install -e ".[dev]"

      - name: Ensure corpus binary for smoke
        run: |
          set -euo pipefail
          # Prefer prebuilt tree; if missing, build C-only small slice.
          if ! find corpus/dev/binaries/c -name '*gcc_O0.exe' 2>/dev/null | head -1 | grep -q .; then
            docker compose --profile tools run --rm --build corpus-builder \
              python3 scripts/build_matrix.py --split dev --languages c || true
          fi
          python3 scripts/speed_smoke_subjects.py | tee /tmp/speed_subjects.env
          # shellcheck disable=SC1091
          source /tmp/speed_subjects.env
          test -n "${BINARY:-}"
          test -n "${ADDRS:-}"
          echo "SPEED_BINARY=$BINARY" >> "$GITHUB_ENV"
          echo "SPEED_ADDRS=$ADDRS" >> "$GITHUB_ENV"

      - name: Run micro-bench
        run: |
          set -euo pipefail
          ENDPOINT_ARGS=()
          if echo "$DECOMPILERS" | tr ',' '\n' | grep -qx fission; then
            ENDPOINT_ARGS+=(--endpoint "fission=http://localhost:8000")
          fi
          if echo "$DECOMPILERS" | tr ',' '\n' | grep -qx ghidra; then
            ENDPOINT_ARGS+=(--endpoint "ghidra=http://localhost:8001")
          fi
          ADDR_ARGS=()
          IFS=',' read -ra AS <<< "$SPEED_ADDRS"
          for a in "${AS[@]}"; do
            ADDR_ARGS+=(--addr "$a")
          done
          mkdir -p results/speed
          python -m runner.speed_microbench \
            "${ENDPOINT_ARGS[@]}" \
            --binary "$SPEED_BINARY" \
            "${ADDR_ARGS[@]}" \
            --trials "${SPEED_TRIALS}" \
            --warmup 0 \
            --timeout 120 \
            --output results/speed/microbench_latest.json
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path("results/speed/microbench_latest.json")
          d = json.loads(p.read_text())
          print("### Speed micro-bench", flush=True)
          print(f"run_id={d.get('run_id')}", flush=True)
          for name, stats in (d.get("by_decompiler") or {}).items():
              cold = stats.get("cold") or {}
              warm = stats.get("warm") or {}
              print(
                  f"- **{name}**: cold mean={cold.get('mean_ms')}ms n={cold.get('n')}; "
                  f"warm mean={warm.get('mean_ms')}ms n={warm.get('n')}",
                  flush=True,
              )
          PY

      - name: Upload micro-bench artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: speed-microbench-${{ github.run_id }}
          path: results/speed/
          if-no-files-found: warn

      - name: Write job summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Speed smoke (non-ranking)"
            echo
            echo "- Fission version: \`$FISSION_VERSION\`"
            echo "- Decompilers: \`$DECOMPILERS\`"
            echo "- Trials: \`$SPEED_TRIALS\` (trial 0 = cold)"
            # SPEED_BINARY/SPEED_ADDRS are only set by the "Ensure corpus
            # binary for smoke" step; this summary step runs unconditionally
            # (if: always()) so an earlier-step failure (e.g. adapter health
            # check) must not also fail *this* step on an unbound variable --
            # that masked the real failure behind a confusing secondary error.
            echo "- Binary: \`${SPEED_BINARY:-<not set — an earlier step failed>}\`"
            echo "- Addrs: \`${SPEED_ADDRS:-<not set — an earlier step failed>}\`"
            echo
            if [ -f results/speed/microbench_latest.json ]; then
              python - <<'PY'
          import json
          from pathlib import Path
          d = json.loads(Path("results/speed/microbench_latest.json").read_text())
          print("| Decompiler | Cold mean | Warm mean | Cold n | Warm n |")
          print("|---|---:|---:|---:|---:|")
          for name, stats in sorted((d.get("by_decompiler") or {}).items()):
              c, w = stats.get("cold") or {}, stats.get("warm") or {}
              print(
                  f"| {name} | {c.get('mean_ms')} | {w.get('mean_ms')} | "
                  f"{c.get('n')} | {w.get('n')} |"
              )
          print()
          print("Does **not** update semantic ranking or Pages.")
          PY
            else
              echo "No microbench JSON produced."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stop containers
        if: always()
        run: docker compose down --volumes --remove-orphans || true
