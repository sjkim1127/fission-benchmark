# Full benchmark run + GitHub Pages deployment.
# Runs on: push to main, weekly schedule, manual dispatch.
# Images are pulled from ghcr.io (pre-built by publish-images.yml).
# Falls back to local build if an image is not yet published.
name: Benchmark & Deploy

env:
  # Official / Pages contract: only GitHub Release bundles. Never FISSION_SOURCE=local.
  FISSION_SOURCE: release
  FISSION_VERSION: ${{ github.event.client_payload.fission_version || github.event.inputs.fission_version || 'latest' }}
  FISSION_ASSETS_TAG: assets-v1
  CORPUS_TARGET: windows-x86_64
  CORPUS_SPLIT: ${{ github.event.inputs.corpus || 'dev' }}
  BENCHMARK_DECOMPILERS: ${{ github.event.inputs.decompilers || 'fission,ghidra,boomerang,radare2,angr,snowman,revng,reko' }}
  BENCHMARK_LIMIT: ${{ github.event.inputs.benchmark_limit || (github.event_name == 'push' && '10' || '0') }}
  BENCHMARK_VARIANT_LIMIT: ${{ github.event.inputs.benchmark_variant_limit || (github.event_name == 'push' && '1' || '0') }}
  RUN_MODE: ${{ github.event.inputs.run_mode || (github.event_name == 'push' && 'smoke' || 'official') }}
  PUBLISH_RESULTS: ${{ github.event.inputs.publish_results || (github.event_name == 'push' && 'false' || 'true') }}
  # Full layered parity by default (0 = no subject cap). Local smoke can override.
  # Timeout must allow Ghidra headless cold-start; 2s was infra-fail only.
  PARITY_LIMIT: ${{ github.event.inputs.parity_limit || '0' }}
  PARITY_DECOMPILERS: ${{ github.event.inputs.parity_decompilers || 'fission,ghidra' }}
  PARITY_REQUEST_TIMEOUT: ${{ github.event.inputs.parity_timeout || '180' }}
  # Conservative reliability: strict only, no leniency in CI.
  PARITY_CANONICALIZE_MODE: strict
  RELIABILITY_POLICY: conservative
  PARITY_BINARY_WORKERS: "3"
  GHIDRA_HEADLESS_WORKERS: "3"
  FISSION_CLI_WORKERS: "8"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/fission-benchmark
  PYTHONPATH: .

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      fission_version:
        description: "Fission release tag to benchmark"
        type: string
        default: "latest"
      corpus:
        description: "Corpus split to benchmark"
        type: choice
        options: [dev, holdout]
        default: dev
      decompilers:
        description: "Comma-separated decompilers to run"
        type: string
        default: "fission,ghidra,boomerang,radare2,angr,snowman,revng,reko"
      benchmark_limit:
        description: "Function limit for dev/holdout benchmark; use 0 for full corpus"
        type: string
        default: "0"
      benchmark_variant_limit:
        description: "Compiler variants per function; use 0 for all variants"
        type: string
        default: "0"
      parity_limit:
        description: "Parity benchmark subject limit; use 0 for full parity"
        type: string
        default: "0"
      publish_results:
        description: "Commit results and deploy GitHub Pages"
        type: boolean
        default: false
      run_mode:
        description: "Execution mode (smoke, local, official)"
        type: choice
        options: [smoke, local, official]
        default: smoke
  repository_dispatch:
    types: [fission-release]
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday midnight UTC

permissions:
  contents: write
  packages: read

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Check benchmark currency
    runs-on: ubuntu-latest
    outputs:
      is_current: ${{ steps.current.outputs.is_current }}
    steps:
      - id: current
        name: Check current branch head
        run: |
          set -eu
          remote_ref="refs/heads/${GITHUB_REF_NAME:-main}"
          current_sha="$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" "$remote_ref" | awk '{print $1}')"
          if [ -z "$current_sha" ] || [ "$GITHUB_SHA" = "$current_sha" ]; then
            echo "is_current=true" >> "$GITHUB_OUTPUT"
            echo "Current benchmark run for ${GITHUB_SHA}"
          else
            echo "is_current=false" >> "$GITHUB_OUTPUT"
            echo "Stale benchmark run: ${GITHUB_SHA}; current ${remote_ref} is ${current_sha}"
          fi

  run-benchmark:
    name: Run benchmark
    needs: preflight
    if: ${{ needs.preflight.outputs.is_current == 'true' }}
    outputs:
      is_current: ${{ steps.current.outputs.is_current }}
      should_publish: ${{ steps.publish-mode.outputs.should_publish }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - id: current
        name: Export current-run state
        run: echo "is_current=${{ needs.preflight.outputs.is_current }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Fission release version
        id: fission-version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          requested="${FISSION_VERSION:-latest}"
          if [ "$requested" = "latest" ]; then
            resolved="$(gh api repos/sjkim1127/Fission/releases/latest --jq .tag_name)"
          else
            resolved="$requested"
          fi
          echo "Resolved Fission version: $resolved"
          echo "FISSION_VERSION=$resolved" >> "$GITHUB_ENV"
          echo "version=$resolved" >> "$GITHUB_OUTPUT"

      - name: Pull or build decompiler images
        run: |
          SERVICES="fission ghidra boomerang radare2 angr snowman revng reko oracle"
          CHANGED_SERVICES=""
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            CHANGED_SERVICES="$(git diff --name-only HEAD~1 HEAD | awk -F/ '/^docker\// {print $2}' | sort -u)"
            echo "Docker services changed in this push:"
            echo "${CHANGED_SERVICES:-<none>}"
          fi

          for svc in $SERVICES; do
            if [ "$svc" = "fission" ]; then
              REMOTE="${IMAGE_PREFIX}-fission:${FISSION_VERSION}"
              echo "==> Trying to pull ${REMOTE}..."
              if docker pull "${REMOTE}" 2>/dev/null; then
                docker tag "${REMOTE}" "fission-benchmark-fission"
                echo "  ✓ Pulled fission ${FISSION_VERSION} from ghcr.io"
              else
                echo "  ⚠  Fission ${FISSION_VERSION} image not found — building locally"
                docker compose build --pull fission
              fi
              continue
            fi

            if echo "$CHANGED_SERVICES" | grep -qx "$svc"; then
              echo "==> Building changed service ${svc} locally for push benchmark..."
              docker compose build "${svc}"
              continue
            fi

            REMOTE="${IMAGE_PREFIX}-${svc}:latest"
            echo "==> Trying to pull ${REMOTE}..."
            if docker pull "${REMOTE}" 2>/dev/null; then
              # Tag as compose expects
              docker tag "${REMOTE}" "fission-benchmark-${svc}"
              echo "  ✓ Pulled ${svc} from ghcr.io"
            else
              echo "  ⚠  Not found on ghcr.io — building ${svc} locally"
              docker compose build "${svc}"
            fi
          done

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install -e ".[dev]"

      - name: Build corpus binaries
        run: docker compose --profile tools run --rm --build corpus-builder

      - name: Start decompiler containers
        run: |
          docker compose up -d fission ghidra boomerang radare2 angr snowman revng reko oracle
          for port in 8000 8001 8002 8003 8004 8005 8006 8008 8010; do
            ready=0
            for i in $(seq 1 30); do
              if curl -sf http://localhost:$port/health; then
                ready=1
                break
              fi
              echo "Waiting for port $port... ($i/30)"
              sleep 5
            done
            if [ "$ready" -ne 1 ]; then
              echo "Service on port $port did not become healthy"
              docker compose ps
              docker compose logs --no-color
              exit 1
            fi
          done

      - name: Verify Fission container version
        run: |
          python -c '
          import json, os, urllib.request
          expected = os.environ["FISSION_VERSION"].lstrip("v")
          health = json.load(urllib.request.urlopen("http://localhost:8000/health", timeout=10))
          actual = str(health.get("version", ""))
          release = str(health.get("release_version", ""))
          source = str(health.get("source", "release"))
          print(f"Fission health version: {actual}")
          print(f"Fission release version: {release}")
          print(f"Fission source: {source}")
          assert source == "release", f"CI must use release source, got {source!r}"
          assert not str(release).startswith("local"), f"CI must not run local bundle: {release}"
          assert not expected or release.lstrip("v") == expected, f"Fission image release mismatch: expected {expected}, got {release}"
          print("✓ Version matches (release)")
          '

      - name: Run dev benchmark
        timeout-minutes: 25
        env:
          ORACLE_ENDPOINT: http://localhost:8010
        run: |
          EXTRA_ARGS=""
          if [ -n "$BENCHMARK_LIMIT" ] && [ "$BENCHMARK_LIMIT" != "0" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --limit $BENCHMARK_LIMIT"
          fi
          if [ -n "$BENCHMARK_VARIANT_LIMIT" ] && [ "$BENCHMARK_VARIANT_LIMIT" != "0" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --variant-limit $BENCHMARK_VARIANT_LIMIT"
          fi
          python runner/runner.py --corpus dev $EXTRA_ARGS --decompilers "$BENCHMARK_DECOMPILERS" --run-mode "$RUN_MODE" --output results/dev_latest.json

      # -----------------------------------------------------------------------
      # Fission validity gate — abort the publish path when every Fission row
      # results/latest.* or be deployed to GitHub Pages.
      # The validity logic lives in runner/run_validity.py (shared with report.py)
      # so the CI gate and the dashboard banner are always in agreement.
      # -----------------------------------------------------------------------
      - name: Validate Fission coverage gate
        id: fission-gate
        run: |
          python -m runner.run_validity results/dev_latest.json \
            --github-env     "$GITHUB_ENV" \
            --github-summary "$GITHUB_STEP_SUMMARY"
          # Standard-set contract (summary + taxonomy denominators + semantic-only correctness)
          python scripts/check_benchmark_path.py results/dev_latest.json

      - name: Run holdout benchmark
        # Skip if validity gate failed — holdout on an invalid run wastes CI time.
        if: steps.fission-gate.outcome == 'success'
        timeout-minutes: 25
        env:
          ORACLE_ENDPOINT: http://localhost:8010
        run: |
          if ! find corpus/holdout/manifests -name '*.json' -print -quit | grep -q .; then
            echo "No holdout manifests found; writing empty holdout result set."
            mkdir -p results
            cat << 'EOF' > results/holdout_latest.json
            {
              "schema_version": 2,
              "run": {
                "status": "skipped",
                "skip_reason": "no_holdout_manifests",
                "corpus": "holdout",
                "official": false
              },
              "toolchain": {},
              "validity": {
                "valid": false,
                "reasons": ["no_result_rows"]
              },
              "rows": []
            }
            EOF
            if [ "$PUBLISH_RESULTS" = "true" ]; then
              echo "Official publication requires a non-empty holdout corpus."
              exit 1
            fi
            exit 0
          fi
          EXTRA_ARGS=""
          if [ -n "$BENCHMARK_LIMIT" ] && [ "$BENCHMARK_LIMIT" != "0" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --limit $BENCHMARK_LIMIT"
          fi
          if [ -n "$BENCHMARK_VARIANT_LIMIT" ] && [ "$BENCHMARK_VARIANT_LIMIT" != "0" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --variant-limit $BENCHMARK_VARIANT_LIMIT"
          fi
          python runner/runner.py --corpus holdout $EXTRA_ARGS --decompilers "$BENCHMARK_DECOMPILERS" --run-mode "$RUN_MODE" --output results/holdout_latest.json

      - name: Run overfitting check
        if: ${{ steps.fission-gate.outcome == 'success' && env.PUBLISH_RESULTS == 'true' }}
        run: |
          python runner/holdout_report.py \
            --dev results/dev_latest.json \
            --holdout results/holdout_latest.json \
            --output results/overfitting_report.md \
            --json-output results/overfitting_report.json

      - name: Evaluate final publication evidence
        if: ${{ steps.fission-gate.outcome == 'success' && env.PUBLISH_RESULTS == 'true' }}
        run: |
          set -euo pipefail
          # Structural readiness (holdout manifests, non-empty rows, overfitting).
          python scripts/check_publication_ready.py \
            --dev results/dev_latest.json \
            --holdout results/holdout_latest.json \
            --overfitting results/overfitting_report.json \
            --require-official
          # Full evidence-linked gate.
          python -m runner.publication_gate \
            --dev results/dev_latest.json \
            --holdout results/holdout_latest.json \
            --overfitting results/overfitting_report.json \
            --output results/publication-verdict.json \
            --github-env "$GITHUB_ENV"

      - name: Determine publish mode
        id: publish-mode
        if: always()
        run: |
          if [ "$PUBLISH_RESULTS" = "true" ] && [ "$MEASUREMENT_VALID" = "true" ] && [ "$RUN_PUBLISHABLE" = "true" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore published dashboard from dev results
        # Only update latest.* when measurement is valid AND run is publishable.
        if: ${{ env.MEASUREMENT_VALID == 'true' && steps.publish-mode.outputs.should_publish == 'true' }}
        run: |
          python runner/render_report.py \
            --input results/dev_latest.json \
            --corpus dev \
            --publication-verdict results/publication-verdict.json \
            --update-latest
          python -c 'from pathlib import Path; from runner.artifact_integrity import verify_artifact_manifest; verify_artifact_manifest(Path("."))'

      - name: Run parity benchmarks (Ghidra reference)
        id: parity
        # Independent reliability gate: runs even if semantic validity fails
        # (containers must still be healthy). Failures block publication below.
        if: always() && steps.fission-gate.outcome != 'skipped'
        timeout-minutes: 45
        env:
          PARITY_CANONICALIZE_MODE: strict
          RELIABILITY_POLICY: conservative
          PARITY_BINARY_WORKERS: ${{ env.PARITY_BINARY_WORKERS }}
          GHIDRA_HEADLESS_WORKERS: ${{ env.GHIDRA_HEADLESS_WORKERS }}
          FISSION_CLI_WORKERS: ${{ env.FISSION_CLI_WORKERS }}
          FISSION_HOST_PORT: "8000"
        run: |
          set -euo pipefail
          echo "Reliability policy: conservative (strict only, no leniency)"
          echo "PARITY_CANONICALIZE_MODE=$PARITY_CANONICALIZE_MODE"
          echo "PARITY_LIMIT=${PARITY_LIMIT:-0} (0=full)"

          EXTRA=()
          if [ -n "${PARITY_LIMIT:-}" ] && [ "$PARITY_LIMIT" != "0" ]; then
            EXTRA+=(--limit "$PARITY_LIMIT")
          fi
          python -m runner.run_parity \
            --corpus "${CORPUS_SPLIT:-dev}" \
            --decompilers "$PARITY_DECOMPILERS" \
            --request-timeout "$PARITY_REQUEST_TIMEOUT" \
            "${EXTRA[@]}"
          python -m benchmark.telemetry.aggregate \
            --output results/telemetry/latest.json \
            --dashboard-copy public/parity-telemetry.json

          # Assert aggregate recorded strict mode (guards accidental env drift).
          python - <<'PY'
          import json, sys
          t = json.load(open("results/telemetry/latest.json", encoding="utf-8"))
          mode = t.get("canonicalize_mode")
          policy = t.get("reliability_policy")
          if mode != "strict":
              print(f"FAIL telemetry canonicalize_mode={mode!r}, require strict", file=sys.stderr)
              sys.exit(1)
          if policy not in (None, "conservative", "strict"):
              print(f"FAIL reliability_policy={policy!r}", file=sys.stderr)
              sys.exit(1)
          print(f"OK mode={mode} policy={policy} rows={t.get('total_rows')}")
          PY

          # Conservative gates — explicit thresholds, hard-fail.
          python scripts/check_parity_smoke.py results/telemetry/latest.json \
            --require-strict \
            --min-comparable 5 \
            --min-usable-coverage 0.90 \
            --max-fetch-error-rate 0.10
          python scripts/check_reliability.py results/telemetry/latest.json \
            --require-strict \
            --min-primary-coverage 0.95 \
            --max-fetch-error-rate 0.05 \
            --max-global-fetch-error-rate 0.05 \
            --min-primary-comparable 5

          # Golden canaries required (not optional).
          test -f benchmark/golden_repros/manifest.json
          python -m benchmark.golden_repros.run benchmark/golden_repros/manifest.json \
            --timeout "$PARITY_REQUEST_TIMEOUT"

          {
            echo "### Parity reliability"
            echo
            echo "- mode: \`$PARITY_CANONICALIZE_MODE\`"
            echo "- policy: \`$RELIABILITY_POLICY\`"
            echo "- limit: \`${PARITY_LIMIT:-0}\` (0=full)"
            if [ -f results/telemetry/latest.json ]; then
              python - <<'PY'
          import json
          t=json.load(open("results/telemetry/latest.json"))
          pub=t.get("publishable") or {}
          dual=(t.get("stages") or {}).get("pcode_parity", {}).get("dual") or pub.get("pcode_dual") or {}
          fd=(t.get("stages") or {}).get("function_discovery", {}).get("dual") or {}
          print(f"- headline_match_rate: `{pub.get('match_rate_comparable')}`")
          print(f"- pcode opcode/loose/strict: `{dual.get('opcode_sequence_match_rate')}` / `{dual.get('loose_full_match_rate')}` / `{dual.get('strict_full_match_rate')}`")
          print(f"- fd presence/manifest recall: `{fd.get('mean_presence_recall')}` / `{fd.get('mean_manifest_recall')}`")
          PY
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload parity telemetry artifacts
        if: always() && steps.parity.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: parity-telemetry
          path: |
            results/telemetry/latest.json
            public/parity-telemetry.json
            results/assembly_parity/latest.jsonl
            results/pcode_parity/latest.jsonl
            results/cfg_parity/latest.jsonl
            results/function_discovery/latest.jsonl
            results/golden_repros/latest.jsonl
          if-no-files-found: warn

      - name: Write benchmark summary
        if: always()
        run: |
          {
            echo "## Fission Benchmark"
            echo
            echo "- Fission version: \`$FISSION_VERSION\`"
            echo "- Corpus: \`$CORPUS_SPLIT\`"
            echo "- Decompilers: \`$BENCHMARK_DECOMPILERS\`"
            echo "- Benchmark limit: \`$BENCHMARK_LIMIT\`"
            echo "- Benchmark variant limit: \`$BENCHMARK_VARIANT_LIMIT\`"
            echo "- Parity limit: \`${PARITY_LIMIT:-0}\` (0=full)"
            echo "- Parity mode: \`$PARITY_CANONICALIZE_MODE\` / policy \`$RELIABILITY_POLICY\`"
            echo
            if [ -f results/latest.md ]; then
              sed -n '1,220p' results/latest.md
            else
              echo "No benchmark report was generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: |
            results/
            docs/
          if-no-files-found: warn

      - name: Commit results
        # Do not commit results from an invalid run, failed reliability gate, or non-publishable run.
        if: >-
          steps.publish-mode.outputs.should_publish == 'true' &&
          steps.fission-gate.outcome == 'success' &&
          steps.parity.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add -f results/ docs/ public/parity-telemetry.json
          git diff --staged --quiet || git commit -m "chore: update benchmark results [skip ci]"
          git push

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop containers
        if: always()
        run: docker compose down --volumes --remove-orphans

  deploy-vercel:
    name: Deploy to Vercel (production)
    needs: run-benchmark
    # Publish only when the benchmark job succeeded (includes parity reliability gate).
    if: >-
      needs.run-benchmark.result == 'success' &&
      needs.run-benchmark.outputs.is_current == 'true' &&
      needs.run-benchmark.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # Pull latest commit (includes committed results)

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "Deployed to: $url" >> "$GITHUB_STEP_SUMMARY"

      - name: Revalidate dashboard ISR cache
        continue-on-error: true  # Best-effort — don't fail the deploy job on transient ISR errors
        env:
          REVALIDATE_URL: ${{ secrets.DASHBOARD_REVALIDATE_URL }}
          REVALIDATE_SECRET: ${{ secrets.DASHBOARD_REVALIDATE_SECRET }}
        run: |
          curl --fail-with-body \
            --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $REVALIDATE_SECRET" \
            "$REVALIDATE_URL/api/revalidate"
          echo "Dashboard cache revalidated" >> "$GITHUB_STEP_SUMMARY"
