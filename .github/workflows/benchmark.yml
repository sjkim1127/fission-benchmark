# Full benchmark run + GitHub Pages deployment.
# Runs on: push to main, weekly schedule, manual dispatch.
name: Benchmark & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday midnight UTC

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        service: [ghidra, retdec, radare2]
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.service }}
        run: docker compose build ${{ matrix.service }}

  run-benchmark:
    name: Run benchmark
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install httpx fastapi uvicorn jinja2 rich typer

      - name: Start decompiler containers
        run: |
          docker compose up -d ghidra retdec radare2
          # Wait for health checks
          for port in 8001 8002 8003; do
            for i in $(seq 1 30); do
              curl -sf http://localhost:$port/health && break
              echo "Waiting for port $port... ($i/30)"
              sleep 5
            done
          done

      - name: Run benchmark (dev corpus)
        run: python runner/runner.py --corpus dev
        env:
          # fission runs locally via CLI, not in Docker for CI
          FISSION_ENDPOINT: skip

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/ docs/
          git diff --staged --quiet || git commit -m "chore: update benchmark results [skip ci]"
          git push

  deploy-pages:
    name: Deploy GitHub Pages
    needs: run-benchmark
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # Pull latest (includes committed results)

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
      - id: deployment
        uses: actions/deploy-pages@v4
