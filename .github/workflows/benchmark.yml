# Full benchmark run + GitHub Pages deployment.
# Runs on: push to main, weekly schedule, manual dispatch.
name: Benchmark & Deploy

env:
  FISSION_VERSION: v0.1.1
  FISSION_ASSETS_TAG: assets-v1
  CORPUS_TARGET: windows-x86_64
  PYTHONPATH: .

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday midnight UTC

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        service: [fission, ghidra, retdec, radare2]
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.service }}
        run: docker compose build ${{ matrix.service }}

  run-benchmark:
    name: Run benchmark
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install httpx fastapi uvicorn jinja2 rich typer

      - name: Build corpus binaries
        run: docker compose --profile tools run --rm --build corpus-builder

      - name: Start decompiler containers
        run: |
          docker compose up -d fission ghidra retdec radare2
          for port in 8000 8001 8002 8003; do
            ready=0
            for i in $(seq 1 30); do
              if curl -sf http://localhost:$port/health; then
                ready=1
                break
              fi
              echo "Waiting for port $port... ($i/30)"
              sleep 5
            done
            if [ "$ready" -ne 1 ]; then
              echo "Service on port $port did not become healthy"
              docker compose ps
              docker compose logs --no-color
              exit 1
            fi
          done

      - name: Run benchmark (dev corpus)
        run: python runner/runner.py --corpus dev

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/ docs/
          git diff --staged --quiet || git commit -m "chore: update benchmark results [skip ci]"
          git push

  deploy-pages:
    name: Deploy GitHub Pages
    needs: run-benchmark
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # Pull latest (includes committed results)

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
      - id: deployment
        uses: actions/deploy-pages@v4
