# Full benchmark run + GitHub Pages deployment.
# Runs on: push to main, weekly schedule, manual dispatch.
name: Benchmark & Deploy

env:
  FISSION_VERSION: ${{ github.event.client_payload.fission_version || github.event.inputs.fission_version || 'latest' }}
  FISSION_ASSETS_TAG: assets-v1
  CORPUS_TARGET: windows-x86_64
  CORPUS_SPLIT: ${{ github.event.inputs.corpus || 'dev' }}
  BENCHMARK_DECOMPILERS: ${{ github.event.inputs.decompilers || 'fission,ghidra,retdec,radare2,angr,snowman,revng' }}
  PYTHONPATH: .

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      fission_version:
        description: "Fission release tag to benchmark"
        type: string
        default: "latest"
      corpus:
        description: "Corpus split to benchmark"
        type: choice
        options: [dev, holdout]
        default: dev
      decompilers:
        description: "Comma-separated decompilers to run"
        type: string
        default: "fission,ghidra,retdec,radare2"
      publish_results:
        description: "Commit results and deploy GitHub Pages"
        type: boolean
        default: true
  repository_dispatch:
    types: [fission-release]
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday midnight UTC

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Check benchmark currency
    runs-on: ubuntu-latest
    outputs:
      is_current: ${{ steps.current.outputs.is_current }}
    steps:
      - id: current
        name: Check current branch head
        run: |
          set -eu
          remote_ref="refs/heads/${GITHUB_REF_NAME:-main}"
          current_sha="$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" "$remote_ref" | awk '{print $1}')"
          if [ -z "$current_sha" ] || [ "$GITHUB_SHA" = "$current_sha" ]; then
            echo "is_current=true" >> "$GITHUB_OUTPUT"
            echo "Current benchmark run for ${GITHUB_SHA}"
          else
            echo "is_current=false" >> "$GITHUB_OUTPUT"
            echo "Stale benchmark run: ${GITHUB_SHA}; current ${remote_ref} is ${current_sha}"
          fi

  build-images:
    name: Build Docker images
    needs: preflight
    if: ${{ needs.preflight.outputs.is_current == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        service: [fission, ghidra, retdec, radare2, angr, snowman, revng]
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.service }}
        run: docker compose build ${{ matrix.service }}

  run-benchmark:
    name: Run benchmark
    needs: [preflight, build-images]
    if: ${{ needs.preflight.outputs.is_current == 'true' }}
    outputs:
      is_current: ${{ steps.current.outputs.is_current }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - id: current
        name: Export current-run state
        run: echo "is_current=${{ needs.preflight.outputs.is_current }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install -e ".[dev]"

      - name: Build corpus binaries
        run: docker compose --profile tools run --rm --build corpus-builder

      - name: Build benchmark containers
        run: docker compose build fission ghidra retdec radare2 angr snowman revng

      - name: Start decompiler containers
        run: |
          docker compose up -d fission ghidra retdec radare2 angr snowman revng
          for port in 8000 8001 8002 8003 8004 8005 8006; do
            ready=0
            for i in $(seq 1 30); do
              if curl -sf http://localhost:$port/health; then
                ready=1
                break
              fi
              echo "Waiting for port $port... ($i/30)"
              sleep 5
            done
            if [ "$ready" -ne 1 ]; then
              echo "Service on port $port did not become healthy"
              docker compose ps
              docker compose logs --no-color
              exit 1
            fi
          done

      - name: Run benchmark
        run: python runner/runner.py --corpus "$CORPUS_SPLIT" --decompilers "$BENCHMARK_DECOMPILERS"

      - name: Write benchmark summary
        if: always()
        run: |
          {
            echo "## Fission Benchmark"
            echo
            echo "- Fission version: \`$FISSION_VERSION\`"
            echo "- Corpus: \`$CORPUS_SPLIT\`"
            echo "- Decompilers: \`$BENCHMARK_DECOMPILERS\`"
            echo
            if [ -f results/latest.md ]; then
              sed -n '1,220p' results/latest.md
            else
              echo "No benchmark report was generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: |
            results/
            docs/
          if-no-files-found: warn

      - name: Commit results
        if: ${{ github.event.inputs.publish_results != 'false' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add -f results/ docs/
          git diff --staged --quiet || git commit -m "chore: update benchmark results [skip ci]"
          git push

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop containers
        if: always()
        run: docker compose down --volumes --remove-orphans

  deploy-pages:
    name: Deploy GitHub Pages
    needs: run-benchmark
    if: ${{ needs.run-benchmark.outputs.is_current == 'true' && github.event.inputs.publish_results != 'false' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # Pull latest (includes committed results)

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
      - id: deployment
        uses: actions/deploy-pages@v4
