# Validates that Docker images build successfully on every PR.
# Builds the core decompiler service images.
name: Docker Build Check

env:
  FISSION_VERSION: latest
  FISSION_ASSETS_TAG: assets-v1
  PYTHONPATH: .

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service: [fission, ghidra, boomerang, radare2, angr, snowman, revng, reko]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Fission release version
        id: fission-version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          requested="${FISSION_VERSION:-latest}"
          if [ "$requested" = "latest" ]; then
            resolved="$(gh api repos/sjkim1127/Fission/releases/latest --jq .tag_name)"
          else
            resolved="$requested"
          fi
          echo "version=$resolved" >> "$GITHUB_OUTPUT"

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-${{ matrix.service }}
          key: buildx-${{ matrix.service }}-${{ hashFiles(format('docker/{0}/**', matrix.service)) }}-${{ steps.fission-version.outputs.version }}
          restore-keys: |
            buildx-${{ matrix.service }}-

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ./docker/${{ matrix.service }}
          push: false
          load: true
          tags: fission-benchmark-${{ matrix.service }}:pr
          build-args: |
            FISSION_SOURCE=release
            FISSION_VERSION=${{ steps.fission-version.outputs.version }}
          cache-from: type=local,src=/tmp/.buildx-cache-${{ matrix.service }}
          cache-to: type=local,dest=/tmp/.buildx-cache-${{ matrix.service }}-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache-${{ matrix.service }}
          mv /tmp/.buildx-cache-${{ matrix.service }}-new /tmp/.buildx-cache-${{ matrix.service }}

  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: ruff check benchmark/ runner/ docker/ scripts/ tests/
      - run: pytest -q
      - name: Verify tests do not generate publication artifacts
        run: git diff --exit-code -- docs/index.html results/latest.json results/latest.md results/latest-summary.json results/artifact-manifest.json

  # ---------------------------------------------------------------------------
  # Contract tests — start each image and run a smoke sequence to verify that
  # the HTTP API contract is intact (health → functions → decompile_batch).
  # For Fission we also verify capabilities are exposed and source == "release".
  # ---------------------------------------------------------------------------
  contract-test:
    name: Contract test ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: fission
            port: 8000
          - service: ghidra
            port: 8001
          - service: boomerang
            port: 8002
          - service: radare2
            port: 8003
          - service: angr
            port: 8004
          - service: snowman
            port: 8005
          - service: revng
            port: 8006
          - service: reko
            port: 8008
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Fission release version
        id: fission-version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          requested="${FISSION_VERSION:-latest}"
          if [ "$requested" = "latest" ]; then
            resolved="$(gh api repos/sjkim1127/Fission/releases/latest --jq .tag_name)"
          else
            resolved="$requested"
          fi
          echo "version=$resolved" >> "$GITHUB_OUTPUT"

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ./docker/${{ matrix.service }}
          push: false
          load: true
          tags: fission-benchmark-${{ matrix.service }}:pr
          build-args: |
            FISSION_SOURCE=release
            FISSION_VERSION=${{ steps.fission-version.outputs.version }}

      - name: Install Python deps
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -e ".[dev]"

      - name: Build corpus binaries
        run: docker compose --profile tools run --rm --build corpus-builder

      - name: Start ${{ matrix.service }} container
        run: |
          # Tag the built image to match what docker-compose expects
          docker tag fission-benchmark-${{ matrix.service }}:pr \
                     fission-benchmark-${{ matrix.service }}

          docker compose up -d ${{ matrix.service }}
          port=${{ matrix.port }}
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:${port}/health" > /dev/null; then
              echo "Container up on port ${port}"
              break
            fi
            echo "Waiting ($i/30)..."
            sleep 5
          done

      - name: Run contract test for ${{ matrix.service }}
        env:
          STRICT_INTEGRATION: "1"
          CONTRACT_SERVICE: ${{ matrix.service }}
          CONTRACT_PORT: ${{ matrix.port }}
        run: |
          python - <<'EOF'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request
          import base64
          from pathlib import Path

          service = os.environ["CONTRACT_SERVICE"]
          port    = int(os.environ["CONTRACT_PORT"])
          base    = f"http://localhost:{port}"

          def get(path):
              with urllib.request.urlopen(f"{base}{path}", timeout=15) as r:
                  return json.loads(r.read())

          def post(path, payload):
              data = json.dumps(payload).encode()
              req = urllib.request.Request(
                  f"{base}{path}", data=data,
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=60) as r:
                  return json.loads(r.read())

          errors = []

          # ── 1. /health ────────────────────────────────────────────────────
          try:
              h = get("/health")
              assert h.get("status") == "ok", f"/health status != ok: {h}"
              print(f"✓ /health OK: decompiler={h.get('decompiler')}")
          except Exception as e:
              errors.append(f"/health failed: {e}")

          # ── Fission-specific: source and capabilities ─────────────────────
          if service == "fission":
              try:
                  h = get("/health")
                  assert h.get("source") == "release", \
                      f"CI must use release source, got {h.get('source')!r}"
                  caps = h.get("capabilities")
                  assert isinstance(caps, dict), \
                      f"Expected capabilities dict in /health, got {caps!r}"
                  print(f"✓ Fission source=release, capabilities={caps}")
              except Exception as e:
                  errors.append(f"Fission /health contract failed: {e}")

          # ── Fission-specific: capability probe diagnostics ────────────────
          if service == "fission":
              try:
                  h = get("/health")
                  probe_ok = h.get("capability_probe_ok")
                  probe_err = h.get("capability_probe_error")
                  assert probe_ok is True, (
                      f"Capability probe failed — all capabilities will be False. "
                      f"Error: {probe_err!r}. "
                      f"This means optional flags like --layer, --benchmark will be "
                      f"silently omitted even if the CLI supports them."
                  )
                  print(f"✓ Fission capability probe OK, capabilities={h.get('capabilities')}")
              except Exception as e:
                  errors.append(f"Fission capability probe check failed: {e}")

          # ── 2. /decompile_batch with a REAL manifest address ───────────────
          # We load the first available corpus manifest to get an actual binary
          # path and a real function address.  This ensures the contract test
          # catches CLI regressions (e.g. unknown --layer flag) that would
          # produce non-empty results[] but with row.error != null.
          #
          # Missing manifests or binaries are treated as infrastructure failures,
          # not as skip conditions.  corpus-builder must have run successfully.
          manifest_dir = Path("corpus/dev/manifests")
          manifest_files = sorted(manifest_dir.glob("*.json")) if manifest_dir.exists() else []

          if not manifest_files:
              errors.append(
                  "No corpus manifests found after corpus-builder ran. "
                  "This is an infrastructure failure, not a skip condition. "
                  "Check that corpus-builder produced at least one .json file "
                  "in corpus/dev/manifests/."
              )
          else:
              # Pick the first manifest with at least one function/variant.
              target_binary = None
              target_addr   = None
              target_name   = None
              for mf in manifest_files:
                  try:
                      m = json.loads(mf.read_text())
                      for fn in m.get("functions", []):
                          for var in fn.get("compiler_variants", []):
                              bp = var.get("binary")
                              addr = var.get("addr")
                              if bp and addr:
                                  target_binary = Path("corpus/dev") / bp
                                  target_addr   = addr
                                  target_name   = fn.get("name", "")
                                  break
                          if target_binary:
                              break
                  except Exception:
                      continue
                  if target_binary:
                      break

              if not target_binary:
                  errors.append(
                      "Manifests exist but contain no function variants with "
                      "both 'binary' and 'addr' fields. Cannot run /decompile_batch "
                      "contract test."
                  )
              elif not target_binary.exists():
                  errors.append(
                      f"Manifest target binary was not built: {target_binary}. "
                      f"Check that corpus-builder compiled the binary correctly."
                  )
              else:
                  binary_b64 = base64.b64encode(target_binary.read_bytes()).decode()
                  print(f"  Using binary={target_binary.name} addr={target_addr} fn={target_name}")
                  try:
                      resp = post("/decompile_batch", {
                          "binary_b64": binary_b64,
                          "addresses": [target_addr],
                      })
                      results = resp.get("results", [])

                      # ── Mandatory assertions ─────────────────────────────────
                      # 1. Must return exactly one result for one address
                      assert isinstance(results, list), \
                          f"results must be a list, got {type(results)}"
                      assert len(results) == 1, \
                          f"Expected 1 result for 1 address, got {len(results)}: {results}"

                      row = results[0]

                      # 2. Must not contain an adapter/CLI error
                      row_error = row.get("error")
                      assert not row_error, (
                          f"Decompiler returned an error for addr={target_addr}: {row_error!r}\n"
                          f"This indicates an adapter/CLI regression (e.g. unsupported flag)."
                      )

                      # 3. Address must round-trip correctly
                      assert row.get("addr") == target_addr, \
                          f"Expected addr={target_addr!r}, got {row.get('addr')!r}"

                      # 4. Code must be non-empty
                      code = row.get("code", "")
                      assert isinstance(code, str) and code.strip(), \
                          f"Decompiler returned empty code for addr={target_addr}. Full row: {row}"

                      print(f"✓ /decompile_batch: addr={target_addr}, code={len(code)} chars, no error")

                  except Exception as e:
                      errors.append(f"/decompile_batch failed: {e}")

          if errors:
              for err in errors:
                  print(f"::error::{err}", file=sys.stderr)
              sys.exit(1)
          print(f"✓ All contract checks passed for {service}")
          EOF

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color ${{ matrix.service }}

      - name: Stop containers
        if: always()
        run: docker compose down --volumes --remove-orphans
