# Validates that Docker images build successfully on every PR.
# Builds the core decompiler service images.
name: Docker Build Check

env:
  FISSION_VERSION: latest
  FISSION_ASSETS_TAG: assets-v1
  PYTHONPATH: .

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service: [fission, ghidra, boomerang, radare2, angr, snowman, revng, reko]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Fission release version
        id: fission-version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          requested="${FISSION_VERSION:-latest}"
          if [ "$requested" = "latest" ]; then
            resolved="$(gh api repos/sjkim1127/Fission/releases/latest --jq .tag_name)"
          else
            resolved="$requested"
          fi
          echo "version=$resolved" >> "$GITHUB_OUTPUT"

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-${{ matrix.service }}
          key: buildx-${{ matrix.service }}-${{ hashFiles(format('docker/{0}/**', matrix.service)) }}-${{ steps.fission-version.outputs.version }}
          restore-keys: |
            buildx-${{ matrix.service }}-

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ./docker/${{ matrix.service }}
          push: false
          load: true
          tags: fission-benchmark-${{ matrix.service }}:pr
          build-args: |
            FISSION_SOURCE=release
            FISSION_VERSION=${{ steps.fission-version.outputs.version }}
          cache-from: type=local,src=/tmp/.buildx-cache-${{ matrix.service }}
          cache-to: type=local,dest=/tmp/.buildx-cache-${{ matrix.service }}-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache-${{ matrix.service }}
          mv /tmp/.buildx-cache-${{ matrix.service }}-new /tmp/.buildx-cache-${{ matrix.service }}

  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: ruff check benchmark/ runner/ docker/ scripts/ tests/
      - run: pytest -q

  # ---------------------------------------------------------------------------
  # Contract tests — start each image and run a smoke sequence to verify that
  # the HTTP API contract is intact (health → functions → decompile_batch).
  # For Fission we also verify capabilities are exposed and source == "release".
  # ---------------------------------------------------------------------------
  contract-test:
    name: Contract test ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: fission
            port: 8000
          - service: ghidra
            port: 8001
          - service: boomerang
            port: 8002
          - service: radare2
            port: 8003
          - service: angr
            port: 8004
          - service: snowman
            port: 8005
          - service: revng
            port: 8006
          - service: reko
            port: 8008
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Fission release version
        id: fission-version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          requested="${FISSION_VERSION:-latest}"
          if [ "$requested" = "latest" ]; then
            resolved="$(gh api repos/sjkim1127/Fission/releases/latest --jq .tag_name)"
          else
            resolved="$requested"
          fi
          echo "version=$resolved" >> "$GITHUB_OUTPUT"

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ./docker/${{ matrix.service }}
          push: false
          load: true
          tags: fission-benchmark-${{ matrix.service }}:pr
          build-args: |
            FISSION_SOURCE=release
            FISSION_VERSION=${{ steps.fission-version.outputs.version }}

      - name: Install Python deps
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -e ".[dev]"

      - name: Build corpus binaries
        run: docker compose --profile tools run --rm --build corpus-builder

      - name: Start ${{ matrix.service }} container
        run: |
          # Tag the built image to match what docker-compose expects
          docker tag fission-benchmark-${{ matrix.service }}:pr \
                     fission-benchmark-${{ matrix.service }}

          docker compose up -d ${{ matrix.service }}
          port=${{ matrix.port }}
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:${port}/health" > /dev/null; then
              echo "Container up on port ${port}"
              break
            fi
            echo "Waiting ($i/30)..."
            sleep 5
          done

      - name: Run contract test for ${{ matrix.service }}
        env:
          STRICT_INTEGRATION: "1"
          CONTRACT_SERVICE: ${{ matrix.service }}
          CONTRACT_PORT: ${{ matrix.port }}
        run: |
          python - <<'EOF'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request
          import base64
          from pathlib import Path

          service = os.environ["CONTRACT_SERVICE"]
          port    = int(os.environ["CONTRACT_PORT"])
          base    = f"http://localhost:{port}"

          def get(path):
              with urllib.request.urlopen(f"{base}{path}", timeout=15) as r:
                  return json.loads(r.read())

          def post(path, payload):
              data = json.dumps(payload).encode()
              req = urllib.request.Request(
                  f"{base}{path}", data=data,
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=60) as r:
                  return json.loads(r.read())

          errors = []

          # ── 1. /health ────────────────────────────────────────────────────
          try:
              h = get("/health")
              assert h.get("status") == "ok", f"/health status != ok: {h}"
              print(f"✓ /health OK: decompiler={h.get('decompiler')}")
          except Exception as e:
              errors.append(f"/health failed: {e}")

          # ── Fission-specific: source and capabilities ─────────────────────
          if service == "fission":
              try:
                  h = get("/health")
                  assert h.get("source") == "release", \
                      f"CI must use release source, got {h.get('source')!r}"
                  caps = h.get("capabilities")
                  assert isinstance(caps, dict), \
                      f"Expected capabilities dict in /health, got {caps!r}"
                  print(f"✓ Fission source=release, capabilities={caps}")
              except Exception as e:
                  errors.append(f"Fission /health contract failed: {e}")

          # ── 2. /decompile_batch with a known binary ────────────────────────
          # Use the smallest corpus binary available (first *.exe or *.elf found).
          corpus_dirs = list(Path("corpus/dev/binaries").glob("**/*.exe")) + \
                        list(Path("corpus/dev/binaries").glob("**/*.elf"))
          if not corpus_dirs:
              # No binary available yet — skip decompile check.
              print(f"⚠ No corpus binary found; skipping /decompile_batch smoke test.")
          else:
              binary_path = corpus_dirs[0]
              binary_b64 = base64.b64encode(binary_path.read_bytes()).decode()
              # Use addr 0x0 — we just want a non-crash response.
              try:
                  resp = post("/decompile_batch", {
                      "binary_b64": binary_b64,
                      "addresses": ["0x0"],
                  })
                  results = resp.get("results", [])
                  assert isinstance(results, list), \
                      f"Expected results list, got {type(results)}"
                  # We do not assert non-empty code because 0x0 may not be a
                  # valid function; we just verify the API does not crash.
                  print(f"✓ /decompile_batch responded with {len(results)} result(s)")
              except Exception as e:
                  errors.append(f"/decompile_batch failed: {e}")

          if errors:
              for err in errors:
                  print(f"::error::{err}", file=sys.stderr)
              sys.exit(1)
          print(f"✓ All contract checks passed for {service}")
          EOF

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color ${{ matrix.service }}

      - name: Stop containers
        if: always()
        run: docker compose down --volumes --remove-orphans

