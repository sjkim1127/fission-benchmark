# Validates that all Docker images build successfully on every PR.
name: Docker Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service: [ghidra, retdec, radare2]
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service }} image
        run: docker compose build ${{ matrix.service }}

  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff pytest
      - run: ruff check benchmark/ runner/ docker/ scripts/ tests/
      - run: pytest -q
