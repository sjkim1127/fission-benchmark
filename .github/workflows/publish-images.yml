# Builds and pushes decompiler Docker images to ghcr.io when their
# Dockerfile or server.py changes on main. Benchmark jobs then pull
# pre-built images instead of re-compiling from scratch every run.
name: Publish Images

on:
  push:
    branches: [main]
    paths:
      - 'docker/fission/**'
      - 'docker/ghidra/**'
      - 'docker/boomerang/**'
      - 'docker/radare2/**'
      - 'docker/angr/**'
      - 'docker/snowman/**'
      - 'docker/revng/**'
  workflow_dispatch:
    inputs:
      services:
        description: "Comma-separated services to rebuild (e.g. fission,ghidra)"
        type: string
        default: "fission,ghidra,boomerang,radare2,angr,snowman,revng"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/fission-benchmark

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.detect.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.services }}"
            # Convert comma-separated input to JSON array
            SERVICES=$(echo "$INPUT" | tr ',' '\n' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^docker/' | sed 's|docker/||;s|/.*||' | sort -u)
            if [ -z "$CHANGED" ]; then
              SERVICES='[]'
            else
              SERVICES=$(echo "$CHANGED" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            fi
          fi
          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"
          echo "Will build: $SERVICES"

  publish:
    name: Build & push ${{ matrix.service }}
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-${{ matrix.service }}
          key: buildx-${{ matrix.service }}-${{ hashFiles(format('docker/{0}/**', matrix.service)) }}
          restore-keys: |
            buildx-${{ matrix.service }}-

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./docker/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache-${{ matrix.service }}
          cache-to: type=local,dest=/tmp/.buildx-cache-${{ matrix.service }}-new,mode=max

      - name: Move cache (keep slim)
        run: |
          rm -rf /tmp/.buildx-cache-${{ matrix.service }}
          mv /tmp/.buildx-cache-${{ matrix.service }}-new /tmp/.buildx-cache-${{ matrix.service }}

      - name: Image digest
        run: echo "Pushed ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest"
