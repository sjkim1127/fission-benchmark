# Builds and pushes decompiler Docker images to ghcr.io when their
# Dockerfile or server.py changes on main. Benchmark jobs then pull
# pre-built images instead of re-compiling from scratch every run.
name: Publish Images

on:
  push:
    branches: [main]
    paths:
      - 'docker/fission/**'
      - 'docker/ghidra/**'
      - 'docker/boomerang/**'
      - 'docker/radare2/**'
      - 'docker/angr/**'
      - 'docker/snowman/**'
      - 'docker/revng/**'
      - 'docker/reko/**'
  workflow_dispatch:
    inputs:
      services:
        description: "Comma-separated services to rebuild (e.g. fission,ghidra)"
        type: string
        default: "fission,ghidra,boomerang,radare2,angr,snowman,revng,reko"
      fission_version:
        description: "Fission release tag to bake into the fission image"
        type: string
        default: "latest"
  repository_dispatch:
    types: [fission-release]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/fission-benchmark
  FISSION_VERSION: ${{ github.event.client_payload.fission_version || github.event.inputs.fission_version || 'latest' }}

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.detect.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            SERVICES='["fission"]'
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.services }}"
            # Convert comma-separated input to JSON array
            SERVICES=$(echo "$INPUT" | tr ',' '\n' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^docker/' | sed 's|docker/||;s|/.*||' | sort -u)
            if [ -z "$CHANGED" ]; then
              SERVICES='[]'
            else
              SERVICES=$(echo "$CHANGED" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            fi
          fi
          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"
          echo "Will build: $SERVICES"

  publish:
    name: Build & push ${{ matrix.service }}
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image metadata
        id: image-meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          svc="${{ matrix.service }}"
          fission_version="${FISSION_VERSION:-latest}"
          if [ "$svc" = "fission" ] && [ "$fission_version" = "latest" ]; then
            fission_version="$(gh api repos/sjkim1127/Fission/releases/latest --jq .tag_name)"
          fi

          {
            echo "fission_version=$fission_version"
            echo "tags<<EOF"
            echo "${IMAGE_PREFIX}-${svc}:latest"
            echo "${IMAGE_PREFIX}-${svc}:${GITHUB_SHA}"
            if [ "$svc" = "fission" ]; then
              echo "${IMAGE_PREFIX}-${svc}:${fission_version}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Image ${svc} tags:"
          sed -n '/tags<<EOF/,/EOF/p' "$GITHUB_OUTPUT"

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-${{ matrix.service }}
          key: buildx-${{ matrix.service }}-${{ hashFiles(format('docker/{0}/**', matrix.service)) }}-${{ steps.image-meta.outputs.fission_version }}
          restore-keys: |
            buildx-${{ matrix.service }}-

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./docker/${{ matrix.service }}
          push: true
          tags: ${{ steps.image-meta.outputs.tags }}
          build-args: |
            FISSION_VERSION=${{ steps.image-meta.outputs.fission_version }}
          cache-from: type=local,src=/tmp/.buildx-cache-${{ matrix.service }}
          cache-to: type=local,dest=/tmp/.buildx-cache-${{ matrix.service }}-new,mode=max

      - name: Move cache (keep slim)
        run: |
          rm -rf /tmp/.buildx-cache-${{ matrix.service }}
          mv /tmp/.buildx-cache-${{ matrix.service }}-new /tmp/.buildx-cache-${{ matrix.service }}

      - name: Image digest
        run: echo "Pushed ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest"
