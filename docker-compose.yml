# fission-benchmark: Multi-decompiler comparison benchmark
# Each decompiler runs as an isolated container exposing a uniform HTTP API.
#
# Usage:
#   docker compose build
#   docker compose up -d
#   python runner/runner.py --corpus dev

services:
  corpus-builder:
    build: ./docker/corpus-builder
    platform: linux/amd64
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      - CORPUS_TARGET=${CORPUS_TARGET:-windows-x86_64}
    command: ["python3", "scripts/build_corpus.py", "--split", "dev"]
    profiles: ["tools"]

  fission:
    build:
      context: ./docker/fission
      args:
        FISSION_VERSION: ${FISSION_VERSION:-v0.1.1}
        FISSION_ASSETS_TAG: ${FISSION_ASSETS_TAG:-assets-v1}
    platform: linux/amd64
    ports: ["${FISSION_HOST_PORT:-8000}:8000"]
    volumes:
      - ./corpus:/corpus:ro
    environment:
      - FISSION_SLEIGH_SPEC_DIR=/sleigh-specs
      - FISSION_RESOURCE_ROOT=/opt/fission-utils/utils
      - FISSION_GHIDRA_DATA_DIR=/opt/fission-utils/utils/ghidra-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  ghidra:
    build: ./docker/ghidra
    ports: ["8001:8000"]
    volumes:
      - ./corpus:/corpus:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  retdec:
    build: ./docker/retdec
    ports: ["8002:8000"]
    volumes:
      - ./corpus:/corpus:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  radare2:
    build: ./docker/radare2
    ports: ["8003:8000"]
    volumes:
      - ./corpus:/corpus:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  angr:
    profiles: ["experimental"]
    build: ./docker/angr
    ports: ["8004:8000"]
    volumes:
      - ./corpus:/corpus:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  snowman:
    profiles: ["experimental"]
    build: ./docker/snowman
    platform: linux/amd64
    ports: ["8005:8000"]
    volumes:
      - ./corpus:/corpus:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  revng:
    profiles: ["experimental"]
    build: ./docker/revng
    platform: linux/amd64
    ports: ["8006:8000"]
    volumes:
      - ./corpus:/corpus:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
