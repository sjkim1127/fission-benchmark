# fission-benchmark: Multi-decompiler comparison benchmark
# Each decompiler runs as an isolated container exposing a uniform HTTP API.
#
# Usage (CI / official — GitHub Release Fission only):
#   docker compose build
#   docker compose up -d
#   python runner/runner.py --corpus dev
#
# Local current-build quality loop (never for Pages / official latest):
#   scripts/prepare_local_fission.sh
#   docker compose -f docker-compose.yml -f docker-compose.local.yml \
#     --profile local up -d --build fission

services:
  corpus-builder:
    build: ./docker/corpus-builder
    platform: linux/amd64
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      - CORPUS_TARGET=${CORPUS_TARGET:-windows-x86_64}
    command: ["python3", "scripts/build_matrix.py", "--split", "${CORPUS_SPLIT:-dev}", "--languages", "${CORPUS_LANGUAGES:-c,cpp,rust,go}"]
    profiles: ["tools"]

  oracle:
    build:
      context: .
      dockerfile: docker/oracle/Dockerfile
    platform: linux/amd64
    ports: ["8010:8000"]
    # Always use the checkout's harness (rename/types/sanitize). The image COPY
    # of runner/ is only a bootstrap — without this mount, CI pulls a stale
    # ghcr oracle and multi-decomp compile floors never move after harness fixes.
    volumes:
      - ./runner:/app/runner:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  fission:
    build:
      context: ./docker/fission
      args:
        # CI must leave this as release (Dockerfile default). Local overlay sets local.
        FISSION_SOURCE: ${FISSION_SOURCE:-release}
        FISSION_VERSION: ${FISSION_VERSION:-v0.1.6}
    platform: linux/amd64
    ports: ["${FISSION_HOST_PORT:-8000}:8000"]
    volumes:
      - ./corpus:/corpus:ro
    environment:
      - FISSION_SOURCE=${FISSION_SOURCE:-release}
      - FISSION_SLEIGH_SPEC_DIR=/sleigh-specs
      - FISSION_RESOURCE_ROOT=/opt/fission-utils/utils
      - FISSION_GHIDRA_DATA_DIR=/opt/fission-utils/utils/ghidra-data
      # Cap concurrent fission_cli children for multi_bundle thrashing control.
      - FISSION_CLI_WORKERS=${FISSION_CLI_WORKERS:-6}
      # Hard functions under CI load exceed 30s; keep aligned with server default.
      - FISSION_DECOMP_TIMEOUT_MS=${FISSION_DECOMP_TIMEOUT_MS:-120000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  ghidra:
    build: ./docker/ghidra
    platform: linux/amd64
    ports: ["8001:8000"]
    volumes:
      - ./corpus:/corpus:ro
      # Persist analyzed programs so parity reuses imports across requests.
      - ghidra-project-cache:/var/cache/ghidra-projects
    environment:
      - GHIDRA_PROJECT_CACHE=/var/cache/ghidra-projects
      # Concurrent multi_bundle across distinct PEs (memory tradeoff).
      - GHIDRA_HEADLESS_WORKERS=${GHIDRA_HEADLESS_WORKERS:-3}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  boomerang:
    build: ./docker/boomerang
    platform: linux/amd64
    ports: ["8002:8000"]
    volumes:
      - ./corpus:/corpus:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5


  radare2:
    build: ./docker/radare2
    ports: ["8003:8000"]
    volumes:
      - ./corpus:/corpus:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  angr:
    build: ./docker/angr
    ports: ["8004:8000"]
    volumes:
      - ./corpus:/corpus:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  snowman:
    build: ./docker/snowman
    platform: linux/amd64
    ports: ["8005:8000"]
    volumes:
      - ./corpus:/corpus:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  revng:
    build: ./docker/revng
    platform: linux/amd64
    ports: ["8006:8000"]
    volumes:
      - ./corpus:/corpus:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  reko:
    build: ./docker/reko
    platform: linux/amd64
    ports: ["8008:8000"]
    volumes:
      - ./corpus:/corpus:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  retdec:
    build: ./docker/retdec
    platform: linux/amd64
    ports: ["8009:8000"]
    volumes:
      - ./corpus:/corpus:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

volumes:
  ghidra-project-cache:
